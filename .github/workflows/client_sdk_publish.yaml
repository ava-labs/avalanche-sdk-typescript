name: Publish Client SDK

on:
  push:
    tags:
      - "client/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        type: string
      tag:
        description: "Tag to publish (e.g., latest, alpha, beta, etc.)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Use Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        id: set_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION=${TAG_NAME#client/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        env:
          STEP_VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          VERSION="$STEP_VERSION"
          cd client
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm run update-version

      - name: Install dependencies
        run: |
          cd client
          npm install
          npm run build:all --if-present

      - name: Update npm
        run: npm install -g npm@latest

      - name: Check if version exists
        id: check_version
        env:
          STEP_VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          cd client
          VERSION="$STEP_VERSION"
          echo "Checking if version $VERSION already exists..."

          if npm view "@avalanche-sdk/client@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish package
        env:
          STEP_VERSION: ${{ steps.set_version.outputs.version }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          VERSION_EXISTS: ${{ steps.check_version.outputs.exists }}
        run: |
          cd client
          VERSION="$STEP_VERSION"
          EXISTS="$VERSION_EXISTS"

          echo "Detected version: $VERSION"
          echo "Input tag: $INPUT_TAG"
          echo "Version exists: $EXISTS"

          if [[ "$EXISTS" == "false" ]]; then
            if [[ "$VERSION" == *"-"* ]]; then
              # Prerelease: publish with auto-detected tag + add input tag if provided
              PRERELEASE=${VERSION#*-}
              TAG=${PRERELEASE%%.*}
              echo "Prerelease detected; publishing under dist-tag: $TAG"
              npm publish --tag "$TAG" --access public
            else
              # Stable: publish with latest tag
              echo "Official release detected; publishing under 'latest'"
              npm publish --access public
            fi
          fi
          if [[ -n "$INPUT_TAG" ]]; then
            echo "Adding input tag: $INPUT_TAG"
            npm dist-tag add "@avalanche-sdk/interchain@$VERSION" "$INPUT_TAG"
          else
            echo "No input tag provided. Skipping tag addition."
          fi
