name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "interchain/**"
      - "e2e/test/unit/**"
      - "e2e/package.json"
      - ".github/workflows/unit-tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Fast unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.1.38"

      - name: Cache Bun deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-unit-${{ hashFiles('e2e/package.json', 'client/package.json', 'interchain/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-unit-
            ${{ runner.os }}-bun-

      - name: Install workspace deps
        working-directory: ${{ github.workspace }}
        run: |
          # interchain unit tests resolve through e2e (file: deps), so we
          # install client + interchain first, then e2e.
          cd client && bun install --frozen-lockfile || bun install
          cd ../interchain && bun install --frozen-lockfile || bun install
          cd ../e2e && bun install

      - name: Build interchain (e2e tests import from dist via file: dep)
        # Job default working-directory is `e2e/`, so `../interchain` is the
        # repo's interchain/ package. Avoid `${{ github.workspace }}/foo` here
        # because some setups handle path concat through that interpolation
        # poorly at workflow-parse time.
        run: cd ../interchain && bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test ./test/unit/
