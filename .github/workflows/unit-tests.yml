name: Unit tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.1.38"

      - name: Install client + interchain deps
        run: |
          cd client && bun install --frozen-lockfile || bun install
          cd ../interchain && bun install --frozen-lockfile || bun install

      - name: Build interchain
        working-directory: interchain
        run: bun run build

      - name: Build client (types + esm only — webpack/cjs not needed for typecheck)
        working-directory: client
        run: |
          bun run clean
          bun run build:esm
          bun run build:types

      # Install e2e LAST so `file:` deps snapshot the freshly-built dist/
      # folders into e2e/node_modules. bun install with file: copies the
      # source dir at install time; building afterwards wouldn't propagate.
      - name: Install e2e deps
        working-directory: e2e
        run: bun install

      - name: Typecheck
        working-directory: e2e
        run: bun run typecheck

      - name: Run unit tests
        working-directory: e2e
        run: bun test test/unit
